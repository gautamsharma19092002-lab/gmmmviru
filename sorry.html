<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffd6e7, #ffeaf4);
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #444;
    }

    .card {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      max-width: 520px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
    }

    .hearts {
      font-size: 20px;
      margin-bottom: 10px;
    }

    h1 {
      color: #ff4d88;
      margin-bottom: 20px;
    }

    p {
      line-height: 1.6;
      margin: 12px 0;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #ff7aa2;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hearts">💖 💕 💗</div>

    <h1>Hi</h1>

    <p>I’m really sorry for what I did. I’ve been thinking about it a lot, and I understand that I hurt you.</p>

    <p>I didn’t want to leave things unsaid, so I’m here writing this.</p>

    <p>You don’t have to reply. I just wanted you to know how I feel.</p>

    <p>I truly am sorry.</p>

    <div class="footer">💗</div>
  </div>
</body>
</html>
